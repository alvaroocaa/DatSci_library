name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - develop
      - chore/**
      - feature/**
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Debug repo files
        run: |
          pwd
          ls -la
          find . -maxdepth 2 -type f | sort

      - name: Install package and test deps
        run: |
          python -m pip install --upgrade pip
          pip install pytest
          pip install -e .

      - name: Run tests
        run: |
          pytest tests/ -v